<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>李姐 · 育儿休息日历（2026年4月20日—2027年4月19日）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f7f5;
      --card: #ffffff;
      --text: #2a2826;
      --muted: #6b6560;
      --border: #e2ded8;
      --rest: #c8e6d0;
      --rest-border: #7cb88c;
      --today: #1a6b4a;
      --shadow: 0 4px 20px rgba(42, 40, 38, 0.06);
      --tiao-rest: #d0e4f0;
      --tiao-rest-border: #7ba8c8;
      --tiao-work-tag: #a07818;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .wrap {
      max-width: min(1480px, 95vw);
      margin: 0 auto;
      padding: 0.45rem 1rem 0.6rem;
      width: 100%;
      box-sizing: border-box;
    }

    header {
      text-align: center;
      margin-bottom: 0.35rem;
    }

    header h1 {
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      font-weight: 700;
      margin: 0 0 0.15rem;
    }

    header h1 .editable-name {
      display: inline-block;
      min-width: 2.5em;
      max-width: 12em;
      padding: 0 0.1rem 0.05rem;
      margin: 0 -0.1rem;
      border-radius: 4px;
      outline: none;
      cursor: text;
      vertical-align: baseline;
    }

    header h1 .editable-name:hover {
      background: rgba(26, 107, 74, 0.06);
    }

    header h1 .editable-name:focus {
      background: rgba(26, 107, 74, 0.1);
      box-shadow: 0 0 0 2px rgba(26, 107, 74, 0.25);
    }

    header h1 .title-rest {
      font-weight: 700;
    }

    header .sub {
      color: var(--muted);
      font-size: 0.78rem;
      max-width: 56rem;
      margin: 0 auto;
      line-height: 1.35;
    }

    .rule-notes {
      background: var(--card);
      border-radius: 8px;
      padding: 0.4rem 0.55rem;
      margin-bottom: 0.4rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 0.76rem;
      line-height: 1.42;
      color: var(--text);
    }

    .rule-notes p {
      margin: 0 0 0.38rem;
    }

    .rule-notes p:last-child {
      margin-bottom: 0;
    }

    .months {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-auto-rows: auto;
      gap: 0.5rem;
      align-items: start;
    }

    .month-block {
      background: var(--card);
      border-radius: 6px;
      padding: 0.4rem 0.36rem 0.46rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      break-inside: avoid;
      page-break-inside: avoid;
      min-width: 0;
      width: 100%;
    }

    .month-block h3 {
      margin: 0 0 0.28rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
    }

    .dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      margin-bottom: 2px;
      font-size: 0.58rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 2px;
      width: 100%;
    }

    .cell {
      min-width: 0;
      min-height: 1.62rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2px 1px;
      background: #fdfcfb;
      position: relative;
      overflow: hidden;
    }

    .cell.empty {
      visibility: hidden;
      pointer-events: none;
      min-height: 1.62rem;
    }

    .cell.rest {
      background: var(--rest);
      border-color: var(--rest-border);
    }

    .cell.tiao-rest {
      background: var(--tiao-rest);
      border-color: var(--tiao-rest-border);
    }

    .cell .num {
      font-weight: 600;
      font-size: clamp(0.62rem, 0.95vw, 0.74rem);
      line-height: 1;
    }

    .cell .tag {
      font-size: clamp(0.48rem, 0.75vw, 0.56rem);
      font-weight: 600;
      margin-top: 1px;
      line-height: 1.1;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      color: #2d4a33;
    }

    .cell .tag.tiao-work-tag {
      color: var(--tiao-work-tag);
    }

    .cell.today {
      outline: 2px solid var(--today);
      outline-offset: -1px;
    }

    .page-settings {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: center;
      gap: 0.65rem 1.1rem;
      margin: 0.4rem auto 0.45rem;
      padding: 0.45rem 0.65rem;
      max-width: 52rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .page-settings .settings-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.22rem;
      min-width: 0;
    }

    .page-settings .settings-item > label,
    .page-settings fieldset.settings-item > legend {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
    }

    .page-settings input[type="date"],
    .page-settings input[type="number"] {
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.32rem 0.45rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      min-width: 7.5rem;
      max-width: 100%;
    }

    .page-settings input[type="number"] {
      min-width: 5.5rem;
    }

    .page-settings .week-toolbar-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.22rem;
    }

    .page-settings .week-toggle {
      display: inline-flex;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #f0eeeb;
    }

    .page-settings .week-toggle button {
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.32rem 0.85rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .page-settings .week-toggle button:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.65);
    }

    .page-settings .week-toggle button[aria-pressed="true"] {
      background: var(--rest);
      color: #1a4d2e;
      font-weight: 600;
    }

    .info-section {
      background: var(--card);
      border-radius: 8px;
      padding: 0.5rem 0.7rem;
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .info-section h4 {
      margin: 0 0 0.3rem;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .info-section .info-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.2rem 0.5rem;
      margin-bottom: 0.2rem;
    }

    .info-section .info-row:last-child {
      margin-bottom: 0;
    }

    .info-section .info-label {
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .info-section .info-value {
      font-weight: 600;
    }

    .info-section .salary-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.4rem 0;
    }

    /* 大屏 5×3（13 个月为 5+5+3）；较窄为 4 列再逐级减少 */
    @media (max-width: 1100px) {
      .months {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 860px) {
      .months {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .months {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .wrap {
        padding-left: 0.55rem;
        padding-right: 0.55rem;
      }

      .months {
        grid-template-columns: 1fr;
      }

      .cell,
      .cell.empty {
        min-height: 1.85rem;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm;
      }

      .page-settings {
        display: none;
      }

      .info-section {
        display: none;
      }

      body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .wrap {
        max-width: none;
        padding: 0;
      }

      .months {
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
      }

      .month-block {
        padding: 4px 6px 6px;
        box-shadow: none;
      }

      .month-block h3 {
        font-size: 9pt;
        margin-bottom: 4px;
      }

      .cell {
        border-radius: 4px;
        padding: 1px;
      }

      .cell .num {
        font-size: 8pt;
      }

      .cell .tag {
        font-size: 6pt;
      }

      .dow {
        font-size: 6pt;
      }

      .rule-notes {
        font-size: 7pt;
        padding: 5px 8px;
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page-header">
      <h1 class="title-line" id="page-title">
        <span
          id="editable-name"
          class="editable-name"
          contenteditable="true"
          spellcheck="false"
          role="textbox"
          aria-label="育儿嫂姓名"
        >李姐</span><span class="title-rest"> · 育儿休息日历</span>
      </h1>
      <p class="sub" id="sub-main">2026年4月20日 — 2027年4月19日</p>
      <div class="page-settings" id="page-settings">
        <div class="settings-item">
          <label for="opt-contract">合同开始日期</label>
          <input type="date" id="opt-contract" name="contractStart" />
        </div>
        <div class="settings-item">
          <span class="week-toolbar-label">每周固定休息</span>
          <div class="week-toggle" role="group" aria-label="每周固定休息">
            <button type="button" class="week-btn" id="week-sun" aria-pressed="true">周日</button>
            <button type="button" class="week-btn" id="week-sat" aria-pressed="false">周六</button>
            <button type="button" class="week-btn" id="week-both" aria-pressed="false">双休</button>
          </div>
        </div>
        <div class="settings-item">
          <label for="opt-salary">月薪（元）</label>
          <input type="number" id="opt-salary" min="0" step="100" placeholder="选填" />
        </div>
      </div>
    </header>

    <section class="rule-notes" aria-label="法定与补休说明">
      <p>
        <strong>「法定」</strong>：法定节假日共 13 天/年——元旦 1 天、春节 4 天（除夕至初三）、清明 1 天、劳动节 2 天、端午 1 天、中秋 1 天、国庆 3 天；与国务院公布的连休「放假」天数不同。
      </p>
      <p id="rule-compensatory"></p>
      <p>
        <strong>「调休」</strong>：国务院安排的调休休息日（蓝色底），非法定节假日；如雇主也休息，通常育儿嫂也休息。<strong>「调休上班」</strong>：原为周末但需上班的日期，育儿嫂的固定休息日不受调休上班影响。
      </p>
    </section>

    <div id="months" class="months"></div>

    <section class="info-section" id="info-section">
      <h4>休息日与加班费统计</h4>
      <div id="info-stats"></div>
      <hr class="salary-divider" />
      <div id="info-salary"></div>
    </section>
  </div>

  <script>
(function () {
  "use strict";

  var STORAGE_KEY = "hongling-weekly-rest";
  var STORAGE_NAME = "hongling-nanny-name";
  var STORAGE_CONTRACT = "hongling-contract-start";
  var STORAGE_SALARY = "hongling-salary";
  var DEFAULT_NANNY_NAME = "李姐";

  function ymd(y, m, d) {
    return new Date(y, m - 1, d);
  }

  function pad(n) {
    return n < 10 ? "0" + n : String(n);
  }

  function fmt(date) {
    return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate());
  }

  function addDays(date, n) {
    var x = new Date(date.getTime());
    x.setDate(x.getDate() + n);
    return x;
  }

  var DEFAULT_CONTRACT = ymd(2026, 4, 20);

  var rangeStart;
  var rangeEnd;

  function parseYmdString(s) {
    if (!s || !/^\d{4}-\d{2}-\d{2}$/.test(s)) {
      return null;
    }
    var p = s.split("-");
    return ymd(parseInt(p[0], 10), parseInt(p[1], 10), parseInt(p[2], 10));
  }

  function loadContractDate() {
    var d = parseYmdString(localStorage.getItem(STORAGE_CONTRACT));
    return d || DEFAULT_CONTRACT;
  }

  function setRangeFromContract(contractDate) {
    rangeStart = new Date(contractDate.getFullYear(), contractDate.getMonth(), contractDate.getDate());
    rangeEnd = addDays(rangeStart, 364);
  }

  /* ── 法定节假日 ── */
  var statutoryKeys = [
    "2026-05-01",
    "2026-05-02",
    "2026-06-19",
    "2026-09-25",
    "2026-10-01",
    "2026-10-02",
    "2026-10-03",
    "2027-01-01",
    "2027-02-05",
    "2027-02-06",
    "2027-02-07",
    "2027-02-08",
    "2027-04-05",
  ];

  var statutoryLabels = {
    "2026-05-01": "劳动节（法定）",
    "2026-05-02": "劳动节（法定）",
    "2026-06-19": "端午节（法定）",
    "2026-09-25": "中秋节（法定）",
    "2026-10-01": "国庆节（法定）",
    "2026-10-02": "国庆节（法定）",
    "2026-10-03": "国庆节（法定）",
    "2027-01-01": "元旦（法定）",
    "2027-02-05": "春节（法定）",
    "2027-02-06": "春节（法定）",
    "2027-02-07": "春节（法定）",
    "2027-02-08": "春节（法定）",
    "2027-04-05": "清明节（法定）",
  };

  var statutorySet = new Set(statutoryKeys);

  function isStatutory(date) {
    return statutorySet.has(fmt(date));
  }

  /* ── 调休上班日 ── */
  var compensatoryWorkKeys = [
    "2026-05-09",  // 劳动节调休上班
    "2026-09-20",  // 国庆节调休上班
    "2026-10-10",  // 国庆节调休上班
    "2027-01-31",  // 春节调休上班（预估）
    "2027-02-14",  // 春节调休上班（预估）
  ];

  var compensatoryWorkLabels = {
    "2026-05-09": "调休上班",
    "2026-09-20": "调休上班",
    "2026-10-10": "调休上班",
    "2027-01-31": "调休上班",
    "2027-02-14": "调休上班",
  };

  var compensatoryWorkSet = new Set(compensatoryWorkKeys);

  function isCompensatoryWork(date) {
    return compensatoryWorkSet.has(fmt(date));
  }

  /* ── 调休休息日 ── */
  var compensatoryRestKeys = [
    "2026-05-04",  // 劳动节调休
    "2026-05-05",  // 劳动节调休
    "2026-10-05",  // 国庆节调休
    "2026-10-06",  // 国庆节调休
    "2026-10-07",  // 国庆节调休
    "2027-02-09",  // 春节调休（预估）
    "2027-02-10",  // 春节调休（预估）
    "2027-02-11",  // 春节调休（预估）
    "2027-02-12",  // 春节调休（预估）
  ];

  var compensatoryRestLabels = {
    "2026-05-04": "劳动节（调休）",
    "2026-05-05": "劳动节（调休）",
    "2026-10-05": "国庆节（调休）",
    "2026-10-06": "国庆节（调休）",
    "2026-10-07": "国庆节（调休）",
    "2027-02-09": "春节（调休）",
    "2027-02-10": "春节（调休）",
    "2027-02-11": "春节（调休）",
    "2027-02-12": "春节（调休）",
  };

  var compensatoryRestSet = new Set(compensatoryRestKeys);

  function isCompensatoryRest(date) {
    return compensatoryRestSet.has(fmt(date));
  }

  /* ── 每周固定休息 ── */
  // weeklyRestDay: 0=周日, 6=周六, "both"=双休
  var weeklyRestDay = 0;

  function loadWeeklyRestDay() {
    var s = localStorage.getItem(STORAGE_KEY);
    if (s === "0" || s === "6" || s === "both") {
      return s === "both" ? "both" : parseInt(s, 10);
    }
    return 0;
  }

  function weeklyRestLabel() {
    if (weeklyRestDay === "both") return "周六日";
    return weeklyRestDay === 0 ? "周日" : "周六";
  }

  function isWeeklyRest(date) {
    var day = date.getDay();
    if (weeklyRestDay === "both") {
      return day === 0 || day === 6;
    }
    return day === weeklyRestDay;
  }

  /* ── 补休计算 ── */
  function compensatoryDay(overlap, existingComp) {
    var c = addDays(overlap, 1);
    while (isStatutory(c) || isWeeklyRest(c) || isCompensatoryRest(c) || existingComp.has(fmt(c))) {
      c = addDays(c, 1);
    }
    return c;
  }

  var today = new Date();
  var todayStr = fmt(today);

  var monthLabels = [
    "一月", "二月", "三月", "四月", "五月", "六月",
    "七月", "八月", "九月", "十月", "十一月", "十二月",
  ];

  var dowLabels = ["日", "一", "二", "三", "四", "五", "六"];

  var monthsEl = document.getElementById("months");

  function lastDayOfMonth(y, m) {
    var next = m === 12 ? ymd(y + 1, 1, 1) : ymd(y, m + 1, 1);
    return addDays(next, -1).getDate();
  }

  function buildMonthSpecs() {
    var list = [];
    var rs = rangeStart;
    var re = rangeEnd;
    var y = rs.getFullYear();
    var m = rs.getMonth() + 1;
    var rsY = rs.getFullYear();
    var rsM = rs.getMonth() + 1;
    var rsD = rs.getDate();
    var reY = re.getFullYear();
    var reM = re.getMonth() + 1;
    var reD = re.getDate();
    while (y < reY || (y === reY && m <= reM)) {
      var startDay = y === rsY && m === rsM ? rsD : 1;
      var last = lastDayOfMonth(y, m);
      var endDay = y === reY && m === reM ? reD : last;
      list.push({ y: y, m: m, start: startDay, end: endDay });
      m++;
      if (m > 12) {
        m = 1;
        y++;
      }
    }
    return list;
  }

  function render() {
    var extraRest = new Set();

    for (var d = new Date(rangeStart); d <= rangeEnd; d = addDays(d, 1)) {
      if (isStatutory(d) && isWeeklyRest(d)) {
        var comp = compensatoryDay(d, extraRest);
        if (comp <= rangeEnd) {
          extraRest.add(fmt(comp));
        }
      }
    }

    function isRest(date) {
      var key = fmt(date);
      return isStatutory(date) || isWeeklyRest(date) || extraRest.has(key) || isCompensatoryRest(date);
    }

    monthsEl.innerHTML = "";

    buildMonthSpecs().forEach(function (spec) {
      var year = spec.y;
      var month = spec.m;
      var startDay = spec.start;
      var endDay = spec.end;

      var firstShown = ymd(year, month, startDay);
      var lead = firstShown.getDay();

      var block = document.createElement("section");
      block.className = "month-block";
      var h3 = document.createElement("h3");
      h3.textContent = year + "年" + monthLabels[month - 1];
      block.appendChild(h3);

      var dow = document.createElement("div");
      dow.className = "dow";
      dowLabels.forEach(function (t) {
        var c = document.createElement("div");
        c.textContent = t;
        dow.appendChild(c);
      });
      block.appendChild(dow);

      var grid = document.createElement("div");
      grid.className = "grid";

      for (var i = 0; i < lead; i++) {
        var e = document.createElement("div");
        e.className = "cell empty";
        grid.appendChild(e);
      }

      for (var day = startDay; day <= endDay; day++) {
        var date = ymd(year, month, day);
        if (date < rangeStart || date > rangeEnd) {
          continue;
        }
        var key = fmt(date);
        var rest = isRest(date);
        var stat = isStatutory(date);
        var extra = extraRest.has(key);
        var tiaoRest = isCompensatoryRest(date);
        var tiaoWork = isCompensatoryWork(date);

        var cell = document.createElement("div");
        cell.className = "cell";

        if (stat || extra) {
          cell.classList.add("rest");
        } else if (tiaoRest) {
          cell.classList.add("tiao-rest");
        } else if (isWeeklyRest(date)) {
          cell.classList.add("rest");
        }

        if (key === todayStr) cell.classList.add("today");

        var num = document.createElement("span");
        num.className = "num";
        num.textContent = String(day);
        cell.appendChild(num);

        var tag = document.createElement("span");
        tag.className = "tag";
        var bits = [];
        if (stat) bits.push(statutoryLabels[key] || "节日（法定）");
        if (extra) bits.push("补休");
        if (tiaoRest && !stat) bits.push(compensatoryRestLabels[key] || "调休");
        if (tiaoWork) {
          tag.classList.add("tiao-work-tag");
          bits.push("调休上班");
        }
        if (!stat && !extra && !tiaoRest && isWeeklyRest(date) && rest) {
          bits.push(weeklyRestLabel());
        }
        tag.textContent = bits.join(" ");
        cell.appendChild(tag);

        grid.appendChild(cell);
      }

      block.appendChild(grid);
      monthsEl.appendChild(block);
    });

    var wn = weeklyRestLabel();

    document.getElementById("rule-compensatory").innerHTML =
      "<strong>补休（向后顺延）</strong>：若某一天<strong>同时</strong>为「法定节假日当日」且「固定休息日」（您选择的「<strong>" +
      wn +
      "</strong>」），则<strong>顺延至之后</strong>第一个既非法定节假日当日、也不是固定休息日、也不是调休休息日的日期<strong>多休 1 天</strong>（格内标「补休」）。";

    renderInfo(extraRest);
  }

  /* ── 统计与加班费 ── */
  function renderInfo(extraRest) {
    var totalDays = 0;
    var statutoryCount = 0;
    var weeklyRestOnlyCount = 0;
    var compensatoryCount = 0;
    var tiaoRestOnlyCount = 0;
    var overlapCount = 0;
    var tiaoWorkOnRestCount = 0;
    var totalRestCount = 0;

    function isRestDay(date) {
      var key = fmt(date);
      return isStatutory(date) || isWeeklyRest(date) || extraRest.has(key) || isCompensatoryRest(date);
    }

    for (var d = new Date(rangeStart); d <= rangeEnd; d = addDays(d, 1)) {
      totalDays++;
      var key = fmt(d);
      var stat = isStatutory(d);
      var wRest = isWeeklyRest(d);
      var extra = extraRest.has(key);
      var tRest = isCompensatoryRest(d);
      var tWork = isCompensatoryWork(d);
      var rest = isRestDay(d);

      if (stat) statutoryCount++;
      if (stat && wRest) overlapCount++;
      if (wRest && !stat && !tRest) weeklyRestOnlyCount++;
      if (extra) compensatoryCount++;
      if (tRest && !stat && !wRest) tiaoRestOnlyCount++;
      if (tWork && wRest) tiaoWorkOnRestCount++;
      if (rest) totalRestCount++;
    }

    var totalWorkCount = totalDays - totalRestCount;

    var statsHtml =
      '<div class="info-row"><span class="info-label">合同期间总天数：</span><span class="info-value">' + totalDays + ' 天</span></div>' +
      '<div class="info-row"><span class="info-label">法定节假日：</span><span class="info-value">' + statutoryCount + ' 天</span></div>' +
      '<div class="info-row"><span class="info-label">每周固定休息（不含重叠）：</span><span class="info-value">' + weeklyRestOnlyCount + ' 天</span></div>' +
      (overlapCount > 0 ? '<div class="info-row"><span class="info-label">法定与固定休息重叠：</span><span class="info-value">' + overlapCount + ' 天</span></div>' : '') +
      (compensatoryCount > 0 ? '<div class="info-row"><span class="info-label">重叠补休：</span><span class="info-value">' + compensatoryCount + ' 天</span></div>' : '') +
      (tiaoRestOnlyCount > 0 ? '<div class="info-row"><span class="info-label">调休休息日（不含重叠）：</span><span class="info-value">' + tiaoRestOnlyCount + ' 天</span></div>' : '') +
      (tiaoWorkOnRestCount > 0 ? '<div class="info-row"><span class="info-label">调休上班日落在固定休息日：</span><span class="info-value">' + tiaoWorkOnRestCount + ' 天</span></div>' : '') +
      '<div class="info-row"><span class="info-label">总休息日：</span><span class="info-value">' + totalRestCount + ' 天</span></div>' +
      '<div class="info-row"><span class="info-label">总工作日：</span><span class="info-value">' + totalWorkCount + ' 天</span></div>';

    document.getElementById("info-stats").innerHTML = statsHtml;

    /* 加班费 */
    var salaryInput = document.getElementById("opt-salary");
    var salary = parseFloat(salaryInput.value) || 0;
    var dailyWage = salary > 0 ? (salary / 21.75) : 0;

    var salaryHtml = '<div class="info-row"><span class="info-label">法定节假日总数：</span><span class="info-value">' + statutoryCount + ' 天</span></div>';

    if (salary > 0) {
      salaryHtml +=
        '<div class="info-row"><span class="info-label">日工资（月薪÷21.75）：</span><span class="info-value">' + dailyWage.toFixed(2) + ' 元</span></div>' +
        '<div class="info-row"><span class="info-label">法定节假日加班双倍工资：</span><span class="info-value">' + statutoryCount + ' × ' + dailyWage.toFixed(2) + ' × 2 = ' + (statutoryCount * dailyWage * 2).toFixed(2) + ' 元</span></div>' +
        '<div class="info-row" style="color:var(--muted);font-size:0.7rem;margin-top:0.15rem">注：劳动法规定法定节假日加班应付 300% 工资，此处按合同双倍计算</div>';
    } else {
      salaryHtml += '<div class="info-row" style="color:var(--muted)">请输入月薪以计算加班费</div>';
    }

    document.getElementById("info-salary").innerHTML = salaryHtml;
  }

  function fmtChineseDate(d) {
    return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
  }

  function updateDocumentTitle() {
    var rawName = localStorage.getItem(STORAGE_NAME);
    var name = rawName === null || rawName === "" ? DEFAULT_NANNY_NAME : rawName.trim();
    if (!name) name = DEFAULT_NANNY_NAME;
    document.title =
      name + " · 育儿休息日历（" + fmtChineseDate(rangeStart) + "—" + fmtChineseDate(rangeEnd) + "）";
  }

  function applySubLine() {
    document.getElementById("sub-main").textContent =
      fmtChineseDate(rangeStart) + " — " + fmtChineseDate(rangeEnd);
  }

  function applyHeader() {
    var rawName = localStorage.getItem(STORAGE_NAME);
    var name = rawName === null ? DEFAULT_NANNY_NAME : rawName.trim();
    if (!name) {
      name = DEFAULT_NANNY_NAME;
    }
    var el = document.getElementById("editable-name");
    if (el && document.activeElement !== el) {
      el.textContent = name;
    }
    updateDocumentTitle();
  }

  function syncContractInput() {
    var d = loadContractDate();
    var stored = localStorage.getItem(STORAGE_CONTRACT);
    var input = document.getElementById("opt-contract");
    if (stored && parseYmdString(stored)) {
      input.value = stored;
    } else {
      input.value = fmt(d);
    }
  }

  function syncWeekToggle() {
    var w = weeklyRestDay;
    document.getElementById("week-sun").setAttribute("aria-pressed", w === 0 ? "true" : "false");
    document.getElementById("week-sat").setAttribute("aria-pressed", w === 6 ? "true" : "false");
    document.getElementById("week-both").setAttribute("aria-pressed", w === "both" ? "true" : "false");
  }

  function setWeeklyRest(w) {
    if (w !== 0 && w !== 6 && w !== "both") {
      w = 0;
    }
    weeklyRestDay = w;
    localStorage.setItem(STORAGE_KEY, String(w));
    syncWeekToggle();
    render();
  }

  function syncSalaryInput() {
    var stored = localStorage.getItem(STORAGE_SALARY);
    var input = document.getElementById("opt-salary");
    if (stored && !isNaN(parseFloat(stored))) {
      input.value = stored;
    }
  }

  setRangeFromContract(loadContractDate());
  weeklyRestDay = loadWeeklyRestDay();

  syncContractInput();
  syncWeekToggle();
  syncSalaryInput();

  var nameEl = document.getElementById("editable-name");

  nameEl.addEventListener("input", function () {
    var t = this.textContent.replace(/\r?\n/g, "").replace(/\s+/g, " ");
    if (t.length > 24) {
      t = t.slice(0, 24);
    }
    if (this.textContent !== t) {
      this.textContent = t;
    }
    localStorage.setItem(STORAGE_NAME, t);
    updateDocumentTitle();
  });

  nameEl.addEventListener("blur", function () {
    var t = this.textContent.trim();
    if (!t) {
      t = DEFAULT_NANNY_NAME;
    }
    this.textContent = t;
    localStorage.setItem(STORAGE_NAME, t);
    applyHeader();
  });

  nameEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      this.blur();
    }
  });

  nameEl.addEventListener("paste", function (e) {
    e.preventDefault();
    var text = (e.clipboardData || window.clipboardData).getData("text/plain").replace(/[\r\n]+/g, "");
    if (text.length > 24) {
      text = text.slice(0, 24);
    }
    document.execCommand("insertText", false, text);
  });

  document.getElementById("opt-contract").addEventListener("change", function () {
    var d = parseYmdString(this.value);
    if (!d) {
      d = DEFAULT_CONTRACT;
      this.value = fmt(d);
    }
    localStorage.setItem(STORAGE_CONTRACT, this.value);
    setRangeFromContract(d);
    applySubLine();
    updateDocumentTitle();
    render();
  });

  document.getElementById("week-sun").addEventListener("click", function () {
    setWeeklyRest(0);
  });

  document.getElementById("week-sat").addEventListener("click", function () {
    setWeeklyRest(6);
  });

  document.getElementById("week-both").addEventListener("click", function () {
    setWeeklyRest("both");
  });

  document.getElementById("opt-salary").addEventListener("input", function () {
    var v = this.value;
    if (v && !isNaN(parseFloat(v)) && parseFloat(v) >= 0) {
      localStorage.setItem(STORAGE_SALARY, v);
    } else {
      localStorage.removeItem(STORAGE_SALARY);
    }
    render();
  });

  applyHeader();
  applySubLine();
  render();
})();
  </script>
</body>
</html>
